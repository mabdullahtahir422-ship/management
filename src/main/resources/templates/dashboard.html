<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Dashboard</title>

  <style>

    body{
      margin:0;
      font-family:'Segoe UI', sans-serif;
      background: radial-gradient(circle at top, #0f2027, #203a43, #2c5364);
      text-align:center;
      color:white;
    }

    /* Header */

    .header{
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(10px);
      padding:30px;
      font-size:32px;
      font-weight:bold;
      box-shadow: 0 0 20px rgba(0,255,255,0.3);
    }

    /* Cards Layout */

    .cards{
      display:flex;
      justify-content:center;
      gap:40px;
      margin-top:50px;
      flex-wrap: wrap;
    }

    /* Card */

    .card{
      position:relative;
      z-index:1;
      width:300px;
      height:180px;
      border-radius:20px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(15px);
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      font-size:22px;
      font-weight:bold;
      box-shadow: 0 0 25px rgba(0,255,255,0.2);
    }

    /* Neon Border */

    .card::before{
      content:"";
      position:absolute;
      inset:0;
      border-radius:20px;
      padding:2px;
      background: linear-gradient(135deg, cyan, blue);
      -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;

      pointer-events:none; /* 🔥 IMPORTANT FIX */
      z-index:0;
    }

    .card span{
      font-size:45px;
      margin-top:15px;
      color:cyan;
    }

    /* Buttons */

    .buttons{
      margin-top:50px;
    }

    .buttons a{
      text-decoration:none;
      margin:5px;
    }

    .buttons button{
      padding:12px 20px;
      border:none;
      border-radius:25px;
      font-size:15px;
      cursor:pointer;
      font-weight:bold;
      background: linear-gradient(90deg, cyan, #00bcd4);
      color:black;
      transition:0.3s;
    }

    .buttons button:hover{
      box-shadow: 0 0 15px cyan;
      transform: scale(1.05);
    }

  </style>

</head>

<body>

<div class="header">
  Portfolio Management Dashboard
</div>

<!-- Cards -->

<div class="cards">

  <div class="card blue">
    Total Projects
    <span th:text="${totalProjects}">0</span>
  </div>

  <div class="card green">
    Active Projects
    <span th:text="${activeProjects}">0</span>
  </div>

  <div class="card orange">
    Completed Projects
    <span th:text="${completedProjects}">0</span>
  </div>

</div>

<!-- Buttons -->

<div class="buttons">

  <a href="/projects">
    <button class="projects">Manage Projects</button>
  </a>

  -

  <a href="/clients">
    <button class="clients">Manage Clients</button>
  </a>

  -

  <a href="/companies">
    <button class="companies">Manage Companies</button>
  </a>

  -

  <a href="/expenses">
    <button class="expenses">Manage Expenses</button>
  </a>

  -

  <a href="/transactions">
    <button class="transactions">Manage Transactions</button>
  </a>

  -

  <a href="/users">
    <button class="users">Manage Users</button>
  </a>

</div>

</body>
</html>
