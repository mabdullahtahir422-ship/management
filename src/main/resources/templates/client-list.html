<!-- client-list.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Clients List</title>

  <style>
    body {
        font-family: 'Segoe UI', sans-serif;
        margin: 0;
        padding: 0;
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        color: white;
    }

    /* Header */
    .header {
        text-align: center;
        padding: 30px;
        font-size: 32px;
        font-weight: bold;
        background: rgba(0,0,0,0.4);
    }

    /* Container */
    .container {
        width: 90%;
        margin: 40px auto;
    }

    /* Card */
    .card {
        background: rgba(0, 0, 0, 0.6);
        padding: 20px;
        border-radius: 20px;
        box-shadow: 0 0 20px rgba(0,255,255,0.3);
        border: 2px solid rgba(0,255,255,0.4);
    }

    /* Table */
    table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
    }

    th, td {
        padding: 12px;
        text-align: center;
    }

    th {
        background: rgba(0, 255, 255, 0.2);
    }

    tr:nth-child(even) {
        background: rgba(255,255,255,0.05);
    }

    tr:hover {
        background: rgba(0,255,255,0.2);
        transition: 0.3s;
    }

    /* Button */
    .btn {
        display: inline-block;
        margin-top: 20px;
        padding: 10px 20px;
        border-radius: 30px;
        background: linear-gradient(90deg, cyan, #00bcd4);
        color: black;
        font-weight: bold;
        text-decoration: none;
        transition: 0.3s;
    }

    .btn:hover {
        transform: scale(1.05);
        box-shadow: 0 0 15px cyan;
    }

  </style>
</head>

<body>

<div class="header">
  Clients List
</div>

<div class="container">
  <div class="card">

    <h2 style="text-align:center;">Clients</h2>

    <table>
      <tr>
        <th>ID</th>
        <th>Company ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Phone</th>
      </tr>

      <tr th:each="client : ${clients}">
        <td th:text="${client.id}">1</td>
        <td th:text="${client.companyId}">1</td>
        <td th:text="${client.clientName}">Name</td>
        <td th:text="${client.email}">email@example.com</td>
        <td th:text="${client.phone}">123456789</td>
      </tr>
    </table>

    <div style="text-align:center;">
      <a th:href="@{/clients/new}" class="btn">+ Add New Client</a>
    </div>

  </div>
</div>

</body>
</html>
