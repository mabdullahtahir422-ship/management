<!-- client-form.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Add Client</title>

  <style>
    body {
        font-family: 'Segoe UI', sans-serif;
        margin: 0;
        padding: 0;
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        color: white;
    }

    /* Header */
    .header {
        text-align: center;
        padding: 30px;
        font-size: 32px;
        font-weight: bold;
        background: rgba(0,0,0,0.4);
    }

    /* Container */
    .container {
        display: flex;
        justify-content: center;
        margin-top: 40px;
    }

    /* Card */
    .card {
        background: rgba(0, 0, 0, 0.6);
        padding: 30px;
        border-radius: 20px;
        width: 400px;
        box-shadow: 0 0 20px rgba(0,255,255,0.3);
        border: 2px solid rgba(0,255,255,0.4);
    }

    .card h2 {
        text-align: center;
        margin-bottom: 20px;
    }

    /* Inputs */
    .form-group {
        margin-bottom: 15px;
    }

    label {
        display: block;
        margin-bottom: 5px;
        font-size: 14px;
    }

    input {
        width: 100%;
        padding: 10px;
        border-radius: 10px;
        border: none;
        outline: none;
        background: #1e293b;
        color: white;
    }

    input:focus {
        border: 2px solid cyan;
    }

    /* Button */
    .btn {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 30px;
        background: linear-gradient(90deg, cyan, #00bcd4);
        color: black;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
    }

    .btn:hover {
        transform: scale(1.05);
        box-shadow: 0 0 15px cyan;
    }

    /* Back link */
    .back {
        display: block;
        text-align: center;
        margin-top: 15px;
        color: cyan;
        text-decoration: none;
    }

    .back:hover {
        text-decoration: underline;
    }

  </style>
</head>

<body>

<div class="header">
  Add Client
</div>

<div class="container">
  <div class="card">

    <h2>Add Client</h2>

    <form th:action="@{/clients/save}" th:object="${client}" method="post">

      <div class="form-group">
        <label>Company ID:</label>
        <input type="number" th:field="*{companyId}" placeholder="Company ID"/>
      </div>

      <div class="form-group">
        <label>Name:</label>
        <input type="text" th:field="*{clientName}" placeholder="Client Name"/>
      </div>

      <div class="form-group">
        <label>Email:</label>
        <input type="email" th:field="*{email}" placeholder="Email"/>
      </div>

      <div class="form-group">
        <label>Phone:</label>
        <input type="text" th:field="*{phone}" placeholder="Phone"/>
      </div>

      <button type="submit" class="btn">Save Client</button>

    </form>

    <a th:href="@{/clients}" class="back">⬅ Back to Clients List</a>

  </div>
</div>

</body>
</html>
